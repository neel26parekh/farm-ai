services:
  - type: web
    name: farm-ai-backend
    env: python
    buildCommand: pip install -r farm-ai-backend/requirements.txt
    startCommand: cd farm-ai-backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: GEMINI_API_KEY
        sync: false # Set this in the Render dashboard
